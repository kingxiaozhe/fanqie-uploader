<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <style>
    :root { color-scheme: light dark; }
    body {
      width: 360px; margin: 0; padding: 16px;
      font: 14px/1.5 system-ui, sans-serif;
    }
    h1 { font-size: 16px; margin: 0 0 4px; }
    .sub { color: #888; font-size: 12px; margin-bottom: 12px; }
    button {
      font: inherit; padding: 8px 14px; border-radius: 8px; cursor: pointer;
      border: 1px solid #3498db; background: #3498db; color: #fff;
    }
    button.ghost { background: transparent; color: #3498db; }
    button:disabled { opacity: .5; cursor: not-allowed; }
    .row { display: flex; gap: 8px; align-items: center; margin-bottom: 10px; }
    #list { max-height: 280px; overflow: auto; border: 1px solid #e0e0e0; border-radius: 8px; }
    .item { display: flex; gap: 8px; padding: 6px 10px; border-bottom: 1px solid #f0f0f0; align-items: center; }
    .item:last-child { border-bottom: none; }
    .item .title { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .item .meta { color: #999; font-size: 11px; }
    .empty { padding: 24px; text-align: center; color: #aaa; }
    .bar { display: flex; justify-content: space-between; align-items: center; margin: 10px 0; font-size: 12px; color: #666; }
    fieldset { border: 1px solid #e0e0e0; border-radius: 8px; margin: 0 0 10px; padding: 8px 12px; }
    legend { font-size: 12px; color: #888; padding: 0 4px; }
    .opt { display: block; font-size: 13px; margin: 3px 0; cursor: pointer; }
    .cfg { font-size: 12px; color: #666; margin: 4px 0 4px 20px; }
    .cfg input[type="number"], .cfg input[type="time"], .cfg input[type="datetime-local"] { font: inherit; }
  </style>
</head>
<body>
  <h1>📚 番茄批量上传器</h1>
  <div class="sub">选择本地章节文件夹 → 勾选 → 开始上传</div>

  <div class="row">
    <!-- webkitdirectory 让用户选整个文件夹，比 showDirectoryPicker 在 popup 里更稳 -->
    <input type="file" id="folder" webkitdirectory directory multiple hidden />
    <button id="pick">📁 选择章节文件夹</button>
    <span id="folderName" class="meta"></span>
  </div>

  <!-- 发布设置 -->
  <fieldset id="settings">
    <legend>发布设置</legend>
    <label class="opt"><input type="radio" name="mode" value="immediate" checked /> ⚡ 立即发布</label>
    <label class="opt"><input type="radio" name="mode" value="auto" /> 🤖 智能定时</label>
    <label class="opt"><input type="radio" name="mode" value="custom" /> ⏰ 自定义起始时间</label>

    <div class="cfg" id="autoCfg" hidden>
      每日 <input type="number" id="dailyChapters" value="1" min="1" max="12" style="width:48px" /> 章，
      起始时刻 <input type="time" id="startHour" value="06:00" />，当天内平均分配<br />
      起始日期
      <select id="startDateMode">
        <option value="auto" selected>自动接续已排期</option>
        <option value="fixed">指定日期</option>
        <option value="tomorrow">明天</option>
      </select>
      <input type="date" id="startDate" hidden />
    </div>
    <div class="cfg" id="customCfg" hidden>
      首章发布时间 <input type="datetime-local" id="customStart" />，后续每小时一章
    </div>

    <label class="opt">操作节奏：
      <select id="pace">
        <option value="1">正常</option>
        <option value="1.6" selected>慢一点（推荐，更稳）</option>
        <option value="2.4">很慢</option>
      </select>
    </label>
    <label class="opt"><input type="checkbox" id="humanize" checked /> 🎭 拟人随机延迟（输入抖动，降低被识别）</label>
    <div class="cfg">章节间隔随机
      <input type="number" id="gapMin" value="5" min="0" max="600" style="width:52px" /> ~
      <input type="number" id="gapMax" value="20" min="1" max="600" style="width:52px" /> 秒
    </div>
    <div class="cfg">发布时间随机偏移 ±
      <input type="number" id="minuteJitter" value="10" min="0" max="120" style="width:48px" /> 分钟（定时模式，破整点规律）
    </div>
    <div class="cfg">本次最多发
      <input type="number" id="maxPerBatch" value="0" min="0" max="999" style="width:56px" /> 章（0=不限；到量自动停，降低风控）
    </div>
    <label class="opt"><input type="checkbox" id="autoRetry" checked /> 失败自动重试（最多 3 次）</label>
    <label class="opt"><input type="checkbox" id="fullDetection" checked /> 发布用「全面检测」（每章 2 次额度；取消则仅基础检测）</label>
    <label class="opt">是否使用 AI（声明）：
      <select id="useAI">
        <option value="no" selected>否</option>
        <option value="yes">是</option>
      </select>
    </label>
    <label class="opt"><input type="checkbox" id="dryRun" /> 🧪 试填模式（只填表，<b>不点发布</b>）</label>
  </fieldset>

  <div class="bar">
    <label><input type="checkbox" id="selectAll" /> 全选</label>
    <span id="count">未加载</span>
  </div>

  <div id="list"><div class="empty">尚未选择文件夹</div></div>

  <details id="previewBox" style="margin-top:10px;" hidden>
    <summary style="cursor:pointer;font-size:12px;color:#666;">📅 排期预览（点开查看每章发布时间）</summary>
    <div id="preview" style="max-height:160px;overflow:auto;font-size:12px;color:#555;margin-top:6px;border:1px solid #eee;border-radius:6px;padding:6px;"></div>
  </details>

  <div class="row" style="margin-top: 12px;">
    <button id="start" disabled>🚀 开始上传选中章节</button>
    <button id="stopBtn" style="border-color:#e74c3c;background:#e74c3c;">⏹ 停止</button>
    <button id="openPanel" class="ghost">📊 进度面板</button>
  </div>

  <script src="popup.js"></script>
</body>
</html>
